    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }
        
        .login-header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
        }
        
        .login-body {
            padding: 40px;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .social-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        
        .spinner i {
            font-size: 20px;
            color: #667eea;
        }
        
        .footer {
            text-align: center;
            padding: 20px 0;
            color: white;
            margin-top: 40px;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="login-card">
                    <div class="login-header">
                        <img src="/public/datum/assets/images/logo.png" alt="SHOPCLONE6 Logo" class="pulse">
                        <h2 class="mt-3 text-white font-weight-bold">SHOPCLONE6</h2>
                        <p class="text-white-50 mb-0">Nền tảng thương mại điện tử</p>
                    </div>
                    
                    <div class="login-body">
                        <div id="alertMessage"></div>
                        
                        <form id="loginForm">
                            <div class="form-group">
                                <label class="text-secondary font-weight-bold">Tên đăng nhập</label>
                                <input type="text" class="form-control" id="username" 
                                       value="admin" 
                                       placeholder="Nhập tên đăng nhập">
                            </div>
                            
                            <div class="form-group mt-3">
                                <label class="text-secondary font-weight-bold">Mật khẩu</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control" id="password" 
                                           value="admin" 
                                           placeholder="Nhập mật khẩu">
                                    <i class="fas fa-eye position-absolute" style="right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6c757d;" onclick="togglePassword()"></i>
                                </div>
                            </div>
                            
                            <div class="form-group mt-4">
                                <center>
                                    <div id="g-recaptcha-response" style="display: inline-block;"></div>
                                </center>
                            </div>
                            
                            <button type="submit" class="btn btn-login btn-block mt-3" id="btnLogin">
                                <i class="fas fa-sign-in-alt mr-2"></i>Đăng nhập
                            </button>
                            
                            <div class="spinner" id="spinner">
                                <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
                            </div>
                        </form>
                        
                        <div class="social-login">
                            <div class="social-btn" onclick="loginWithGoogle()">
                                <i class="fab fa-google text-danger"></i>
                            </div>
                            <div class="social-btn" onclick="loginWithFacebook()">
                                <i class="fab fa-facebook-f text-primary"></i>
                            </div>
                            <div class="social-btn" onclick="loginWithApple()">
                                <i class="fab fa-apple text-dark"></i>
                            </div>
                        </div>
                        
                        <div class="text-center mt-4">
                            <p class="mb-0 text-secondary">Bạn chưa có tài khoản? <a href="/client/register" class="font-weight-bold text-primary">Đăng ký ngay</a></p>
                            <p class="mt-2 mb-0"><a href="/client/forgot-password" class="text-decoration-none text-primary">Quên mật khẩu?</a></p>
                        </div>
                    </div>
                </div>
                
                <div class="footer">
                    <p class="mb-0">© 2026 SHOPCLONE6. Tất cả quyền được bảo lưu.</p>
                    <p class="mt-1 small">Version 7.4.1 | Thiết kế bởi <strong>CMSNT.CO</strong></p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function loginWithGoogle() {
            cuteToast({
                type: "info",
                message: "Tính năng đăng nhập Google sẽ sớm ra mắt!",
                timer: 3000
            });
        }
        
        function loginWithFacebook() {
            cuteToast({
                type: "info",
                message: "Tính năng đăng nhập Facebook sẽ sớm ra mắt!",
                timer: 3000
            });
        }
        
        function loginWithApple() {
            cuteToast({
                type: "info",
                message: "Tính năng đăng nhập Apple sẽ sớm ra mắt!",
                timer: 3000
            });
        }
        
        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showAlert('warning', 'Vui lòng nhập tên đăng nhập và mật khẩu');
                return;
            }
            
            // Show loading spinner
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('btnLogin').disabled = true;
            
            // Simulate login API call (replace with actual API call)
            setTimeout(function() {
                // Hide loading spinner
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('btnLogin').disabled = false;
                
                // Show success alert
                showAlert('success', 'Đăng nhập thành công!');
                
                // Redirect to dashboard after 1.5 seconds
                setTimeout(function() {
                    window.location.href = '/client/home';
                }, 1500);
            }, 1500);
        });
        
        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertMessage');
            
            let alertClass = 'alert-primary';
            let icon = 'fas fa-info-circle';
            
            if (type === 'success') {
                alertClass = 'alert-success';
                icon = 'fas fa-check-circle';
            } else if (type === 'warning') {
                alertClass = 'alert-warning';
                icon = 'fas fa-exclamation-triangle';
            } else if (type === 'error') {
                alertClass = 'alert-danger';
                icon = 'fas fa-times-circle';
            }
            
            alertContainer.innerHTML = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    <i class="${icon} mr-2"></i>
                    ${message}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            `;
            
            // Auto hide after 5 seconds
            setTimeout(function() {
                const alert = document.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(function() {
                        alert.remove();
                    }, 300);
                }
            }, 5000);
        }
        
        // Add reCAPTCHA if needed
        function initRecaptcha() {
            // This would integrate with Google's reCAPTCHA v3 or v2
            console.log('reCAPTCHA initialization would go here');
        }
        
        // Animation on load
        window.addEventListener('load', function() {
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(function() {
                card.style.transition = 'all 0.5s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
